services:
  postgres:
    image: postgres:16-alpine
    container_name: email-ai-postgres
    environment:
      POSTGRES_DB: email_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: email-ai-redis

  backend:
    build:
      context: ./backend
    container_name: email-ai-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/email_ai
      REDIS_URL: redis://redis:6379/0
      LLM_ENABLED: "false"
      LLM_PROVIDER: mock
      LLM_MODEL: gpt-4.1-mini
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    container_name: email-ai-worker
    command: celery -A celery_worker.celery worker --loglevel=info --pool=solo
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/email_ai
      REDIS_URL: redis://redis:6379/0
      LLM_ENABLED: "false"
      LLM_PROVIDER: mock
      LLM_MODEL: gpt-4.1-mini
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      - postgres
      - redis

  frontend:
    image: nginx:alpine
    container_name: email-ai-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  postgres_data:
